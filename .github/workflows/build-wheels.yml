  # ══════════════════════════════════════════
  # 태그 푸시 → GitHub Release
  # ══════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    # needs: [build-linux, build-windows]
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: true

      - name: List wheels
        run: ls -lh wheels/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: wheels/*.whl
          body: |
            ## pywhispercpp custom wheels

            ### 설치 방법
            ```bash
            pip install pywhispercpp_vulkan-*.whl   # GPU 환경
            pip install pywhispercpp_cpu-*.whl      # CPU 전용
            ```

            | wheel | 사용 조건 |
            |---|---|
            | `*-vulkan-*linux*.whl` | Linux + Vulkan 드라이버 |
            | `*-cpu-*linux*.whl` | Linux CPU 전용 |
            | `*-vulkan-*win*.whl` | Windows + GPU 드라이버 |
            | `*-cpu-*win*.whl` | Windows CPU 전용 |
