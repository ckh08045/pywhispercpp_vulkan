name: Build pywhispercpp wheels

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ══════════════════════════════════════════
  # Linux wheels
  # ══════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: vulkan
            env_var: WHISPER_VULKAN=1
            # libvulkan-dev(apt) 는 1.3.204 헤더 → 사용 안 함
            # SDK 액션(1.3.280)이 헤더 + glslc 모두 제공
            apt_extra: ""
            needs_vulkan_sdk: true
            artifact: pywhispercpp-vulkan-linux

          - backend: cpu
            env_var: ""
            apt_extra: ""
            needs_vulkan_sdk: false
            artifact: pywhispercpp-cpu-linux

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.16
        with:
          key: linux-${{ matrix.backend }}-pywhispercpp
          evict-old-files: 7d

      - name: Install Vulkan SDK
        if: matrix.needs_vulkan_sdk == true
        uses: jakoch/install-vulkan-sdk-action@v1.0.4
        with:
          vulkan_version: 1.3.280.0
          install_runtime: false
          cache: true

      # SDK 경로를 PATH + VULKAN_SDK 환경변수로 등록
      # cmake 가 apt 헤더(1.3.204) 대신 SDK 헤더(1.3.280)를 사용하게 함
      - name: Set Vulkan SDK env
        if: matrix.needs_vulkan_sdk == true
        run: |
          SDK_ROOT=$(find "$HOME/vulkan-sdk" -maxdepth 1 -mindepth 1 -type d | head -1)
          if [ -z "$SDK_ROOT" ]; then
            echo "ERROR: SDK 설치 경로를 찾을 수 없습니다"
            ls "$HOME/vulkan-sdk" || true
            exit 1
          fi
          # x86_64 서브디렉토리가 있는 경우 (Linux SDK 구조)
          if [ -d "$SDK_ROOT/x86_64" ]; then
            ARCH_DIR="$SDK_ROOT/x86_64"
          else
            ARCH_DIR="$SDK_ROOT"
          fi
          echo "SDK_ROOT=$SDK_ROOT"
          echo "ARCH_DIR=$ARCH_DIR"
          find "$ARCH_DIR" -name "glslc" 2>/dev/null || echo "(glslc 없음)"
          find "$ARCH_DIR" -name "vulkan.h" 2>/dev/null | head -3 || echo "(vulkan.h 없음)"

          # PATH: bin 디렉토리
          echo "$ARCH_DIR/bin" >> $GITHUB_PATH
          # VULKAN_SDK: cmake FindVulkan.cmake 가 참조하는 환경변수
          echo "VULKAN_SDK=$ARCH_DIR" >> $GITHUB_ENV

      - name: Verify glslc
        if: matrix.needs_vulkan_sdk == true
        run: |
          which glslc
          glslc --version
          echo "VULKAN_SDK=$VULKAN_SDK"

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            ${{ matrix.apt_extra }}

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          pip install build wheel cmake setuptools setuptools-scm ninja \
                      pybind11 numpy repairwheel

      - name: Build wheel
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          export ${{ matrix.env_var }} 2>/dev/null || true
          python -m build --no-isolation --wheel --outdir dist/

      - name: Inspect wheel
        run: |
          ls -lh dist/
          python -m zipfile -l dist/*.whl | grep -E "\.(so|py)$" | head -20

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.whl
          retention-days: 30

  # ══════════════════════════════════════════
  # Windows wheels
  # ══════════════════════════════════════════
  build-windows:
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: vulkan
            artifact: pywhispercpp-vulkan-windows
            needs_vulkan_sdk: true

          - backend: cpu
            artifact: pywhispercpp-cpu-windows
            needs_vulkan_sdk: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup sccache
        uses: hendrikmuhs/ccache-action@v1.2.16
        with:
          key: windows-${{ matrix.backend }}-pywhispercpp
          variant: sccache
          evict-old-files: 7d

      - name: Install Vulkan SDK
        if: matrix.needs_vulkan_sdk == true
        uses: jakoch/install-vulkan-sdk-action@v1.0.4
        with:
          vulkan_version: 1.3.280.0
          install_runtime: false
          cache: true

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          pip install build wheel cmake setuptools setuptools-scm ninja `
                      pybind11 numpy repairwheel

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # cl.exe 절대경로를 MSVC_CL 환경변수로 노출
      # ExternalProject(vulkan-shaders-gen)에 CMAKE_C/CXX_COMPILER 전달용
      - name: Find cl.exe path
        if: matrix.needs_vulkan_sdk == true
        shell: pwsh
        run: |
          $cl = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -find "VC\Tools\MSVC\*\bin\HostX64\x64\cl.exe" | Select-Object -First 1
          if (-not $cl) {
            $cl = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "cl.exe" |
              Where-Object { $_.FullName -match "HostX64\\x64" } | Select-Object -First 1 -ExpandProperty FullName
          }
          echo "cl.exe: $cl"
          echo "MSVC_CL=$cl" >> $env:GITHUB_ENV

      - name: Build wheel (vulkan)
        if: matrix.backend == 'vulkan'
        env:
          WHISPER_VULKAN: "1"
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
          # ExternalProject에 MSVC 컴파일러 전달 (setup.py에서 cmake_args에 추가)
          WHISPER_EXTRA_CMAKE_ARGS: >-
            -DCMAKE_C_COMPILER=${{ env.MSVC_CL }}
            -DCMAKE_CXX_COMPILER=${{ env.MSVC_CL }}
        run: python -m build --no-isolation --wheel --outdir dist/

      - name: Build wheel (cpu)
        if: matrix.backend == 'cpu'
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: python -m build --no-isolation --wheel --outdir dist/

      - name: Inspect wheel
        shell: pwsh
        run: Get-ChildItem dist\ | Format-Table Name, Length -AutoSize

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist\*.whl
          retention-days: 30

  # ══════════════════════════════════════════
  # 태그 푸시 → GitHub Release
  # ══════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: true

      - name: List wheels
        run: ls -lh wheels/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: wheels/*.whl
          body: |
            ## pywhispercpp custom wheels

            ### 설치 방법
            ```bash
            # GPU 환경 (AMD / NVIDIA / Intel iGPU)
            pip install pywhispercpp_vulkan-*.whl

            # CPU 전용 / 폴백
            pip install pywhispercpp_cpu-*.whl
            ```

            ### 선택 기준
            | wheel | 사용 조건 |
            |---|---|
            | `*-vulkan-*linux*.whl` | Linux + Vulkan 드라이버 설치됨 |
            | `*-cpu-*linux*.whl` | Linux CPU 전용 |
            | `*-vulkan-*win*.whl` | Windows + GPU 드라이버 설치됨 |
            | `*-cpu-*win*.whl` | Windows CPU 전용 |

            > Vulkan wheel은 드라이버 없는 환경에서 import 시 실패합니다.
