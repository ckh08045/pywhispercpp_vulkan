name: Build pywhispercpp wheels

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ══════════════════════════════════════════
  # Linux wheels
  # ══════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: vulkan
            env_var: WHISPER_VULKAN=1
            needs_vulkan_sdk: true
            artifact: pywhispercpp-vulkan-linux

          - backend: cpu
            env_var: ""
            needs_vulkan_sdk: false
            artifact: pywhispercpp-cpu-linux

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.16
        with:
          key: linux-${{ matrix.backend }}-pywhispercpp
          evict-old-files: 7d

      # SDK 액션이 헤더(1.3.280) + glslc 모두 제공
      # apt libvulkan-dev(1.3.204)는 사용하지 않음 — 헤더 버전 충돌 방지
      - name: Install Vulkan SDK
        if: matrix.needs_vulkan_sdk == true
        uses: jakoch/install-vulkan-sdk-action@v1.0.4
        with:
          vulkan_version: 1.3.280.0
          install_runtime: false
          cache: true

      - name: Set Vulkan SDK env
        if: matrix.needs_vulkan_sdk == true
        run: |
          SDK_ROOT=$(find "$HOME/vulkan-sdk" -maxdepth 1 -mindepth 1 -type d | head -1)
          if [ -d "$SDK_ROOT/x86_64" ]; then
            ARCH_DIR="$SDK_ROOT/x86_64"
          else
            ARCH_DIR="$SDK_ROOT"
          fi
          echo "glslc: $(find $ARCH_DIR -name glslc 2>/dev/null | head -1)"
          echo "$ARCH_DIR/bin" >> $GITHUB_PATH
          echo "VULKAN_SDK=$ARCH_DIR" >> $GITHUB_ENV

      - name: Verify glslc
        if: matrix.needs_vulkan_sdk == true
        run: |
          which glslc
          glslc --version

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          pip install build wheel cmake setuptools setuptools-scm ninja \
                      pybind11 numpy repairwheel

      - name: Build wheel
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          export ${{ matrix.env_var }} 2>/dev/null || true
          python -m build --no-isolation --wheel --outdir dist/

      - name: Inspect wheel
        run: |
          ls -lh dist/
          python -m zipfile -l dist/*.whl | grep -E "\.(so|py)$" | head -20

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.whl
          retention-days: 30

