name: Build pywhispercpp windows wheels

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ══════════════════════════════════════════
  # Windows wheels
  # ══════════════════════════════════════════
  build-windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: vulkan
            artifact: pywhispercpp-vulkan-windows
            needs_vulkan_sdk: true
          - backend: cpu
            artifact: pywhispercpp-cpu-windows
            needs_vulkan_sdk: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        if: matrix.needs_vulkan_sdk == true
        uses: jakoch/install-vulkan-sdk-action@v1.0.4
        with:
          vulkan_version: 1.3.280.0
          install_runtime: false
          cache: true

      # MSVC Developer Command Prompt 환경 설정
      # cl.exe를 PATH에 추가 → ExternalProject(vulkan-shaders-gen)의 서브 cmake가
      # Visual Studio 환경 상속 없이도 cl.exe를 자동 발견
      - name: Setup MSVC dev env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          pip install build wheel cmake setuptools setuptools-scm ninja `
                      pybind11 numpy repairwheel
      
      # [수정됨] 들여쓰기 교정 완료
      - name: Build wheel (vulkan)
        if: matrix.backend == 'vulkan'
        env:
          WHISPER_VULKAN: "1"
        run: python -m build --no-isolation --wheel --outdir dist/

      - name: Build wheel (cpu)
        if: matrix.backend == 'cpu'
        run: python -m build --no-isolation --wheel --outdir dist/

      # ── [추가된 부분] 빌드된 DLL 파일들을 .whl 안에 끼워 넣는 과정 ──
      - name: Repair wheel (Windows)
        shell: pwsh
        run: |
          # 1. 생성된 wheel 파일 이름 찾기
          $wheel_file = Get-ChildItem -Path dist\*.whl | Select-Object -First 1
          
          # 2. CMake가 dll을 생성한 경로 지정 (Python 3.11 기준 경로)
          $dll_dir = "build\temp.win-amd64-cpython-311\Release\pywhispercpp._pywhispercpp\bin\Release"
          
          # 3. repairwheel 실행 (dll 폴더를 지정하여 바인딩)
          repairwheel $wheel_file.FullName -o dist\repaired -l $dll_dir
          
          # 4. 기존 wheel을 수리된 wheel로 덮어쓰기 및 임시 폴더 삭제
          Move-Item -Path dist\repaired\*.whl -Destination dist\ -Force
          Remove-Item -Path dist\repaired -Recurse

      - name: Inspect wheel
        shell: pwsh
        run: Get-ChildItem dist\ | Format-Table Name, Length -AutoSize
        
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist\*.whl
          retention-days: 30

  # ══════════════════════════════════════════
  # 태그 푸시 → GitHub Release (Windows 전용)
  # ══════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: true

      - name: List wheels
        run: ls -lh wheels/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: wheels/*.whl
          body: |
            ## pywhispercpp custom wheels (Windows)

            ### 설치 방법
            ```bash
            pip install pywhispercpp_vulkan-*.whl   # GPU 환경
            pip install pywhispercpp_cpu-*.whl      # CPU 전용
            ```

            | wheel | 사용 조건 |
            |---|---|
            | `*-vulkan-*win*.whl` | Windows + GPU 드라이버 |
            | `*-cpu-*win*.whl` | Windows CPU 전용 |
