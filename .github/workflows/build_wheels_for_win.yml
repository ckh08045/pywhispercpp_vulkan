name: Build pywhispercpp windows wheels

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ══════════════════════════════════════════
  # Windows wheels
  # ══════════════════════════════════════════
  build-windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: vulkan
            artifact: pywhispercpp-vulkan-windows
            needs_vulkan_sdk: true
          - backend: cpu
            artifact: pywhispercpp-cpu-windows
            needs_vulkan_sdk: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup sccache
        uses: hendrikmuhs/ccache-action@v1.2.16
        with:
          key: windows-${{ matrix.backend }}-pywhispercpp
          variant: sccache
          evict-old-files: 7d

      - name: Install Vulkan SDK
        if: matrix.needs_vulkan_sdk == true
        uses: jakoch/install-vulkan-sdk-action@v1.0.4
        with:
          vulkan_version: 1.3.280.0
          install_runtime: false
          cache: true

      # MSVC Developer Command Prompt 환경 설정
      # cl.exe를 PATH에 추가 → ExternalProject(vulkan-shaders-gen)의 서브 cmake가
      # Visual Studio 환경 상속 없이도 cl.exe를 자동 발견
      - name: Setup MSVC dev env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          pip install build wheel cmake setuptools setuptools-scm ninja `
                      pybind11 numpy repairwheel

      - name: Build wheel (vulkan)
        if: matrix.backend == 'vulkan'
        env:
          WHISPER_VULKAN: "1"
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: python -m build --no-isolation --wheel --outdir dist/

      - name: Build wheel (cpu)
        if: matrix.backend == 'cpu'
        env:
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: python -m build --no-isolation --wheel --outdir dist/

      - name: Inspect wheel
        shell: pwsh
        run: Get-ChildItem dist\ | Format-Table Name, Length -AutoSize

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist\*.whl
          retention-days: 30

  # ══════════════════════════════════════════
  # 태그 푸시 → GitHub Release (Windows 전용)
  # ══════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels/
          merge-multiple: true

      - name: List wheels
        run: ls -lh wheels/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: wheels/*.whl
          body: |
            ## pywhispercpp custom wheels (Windows)

            ### 설치 방법
            ```bash
            pip install pywhispercpp_vulkan-*.whl   # GPU 환경
            pip install pywhispercpp_cpu-*.whl      # CPU 전용
            ```

            | wheel | 사용 조건 |
            |---|---|
            | `*-vulkan-*win*.whl` | Windows + GPU 드라이버 |
            | `*-cpu-*win*.whl` | Windows CPU 전용 |
